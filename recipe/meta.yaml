{% set version = "1.6.1" %}
{% set name = "id" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: d0732d624fb46fd4e7bc4e5152f00214450953b9e772c182c1c22964def1a069

build:
  number: 0
  skip: true  # [py<39]
  script:
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - flit-core >=3.2,<4
    - pip
  run:
    - python
    - requests
    - urllib3 >=2,<3
  run_constrained:
    - ruff <0.8.2

test:
  source_files:
    - test
  imports:
    - id
  commands:
    - pip check
    - coverage run --source=id --branch -m pytest -vv --tb=long --color=yes
    - coverage report --show-missing --skip-covered --fail-under=82
  requires:
    - pip
    - pytest
    - pytest-cov
    - pretend
    - coverage

about:
  home: https://github.com/di/id
  summary: A tool for generating OIDC identities
  description: |
    id is a Python tool for generating OIDC identities. It can automatically
    detect and produce OIDC credentials on a number of environments,
    including GitHub Actions, GitLab pipelines and Google Cloud.
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  dev_url: https://github.com/di/id
  doc_url: https://github.com/di/id/blob/main/README.md

extra:
  recipe-maintainers:
    - bollwyvl
