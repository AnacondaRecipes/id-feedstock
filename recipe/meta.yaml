{% set version = "1.5.0" %}
{% set python_min = "3.8" %}

package:
  name: id
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/i/id/id-{{ version }}.tar.gz
  sha256: 292cb8a49eacbbdbce97244f47a97b4c62540169c976552e497fd57df0734c1d

build:
  number: 0
  skip: true # [py<38]
  script:
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python
    - flit-core >=3.2,<4
    - pip
  run:
    - python
    - requests

test:
  source_files:
    - test
  imports:
    - id
  commands:
    - pip check
    - coverage run --source=id --branch -m pytest -vv --tb=long --color=yes
    - coverage report --show-missing --skip-covered --fail-under=82
  requires:
    - pip
    - pytest
    - pytest-cov
    - pretend
    - coverage

about:
  home: https://github.com/di/id
  summary: A tool for generating OIDC identities
  description: |
    id is a Python tool for generating OIDC identities. It can automatically
    detect and produce OIDC credentials on a number of environments,
    including GitHub Actions, GitLab pipelines and Google Cloud.
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  dev_url: https://github.com/di/id
  doc_url: https://github.com/di/id/blob/main/README.md

extra:
  recipe-maintainers:
    - bollwyvl